  <style>

    html[data-theme="light"] {

      --text: #37352f;
      --sub-text: #787774;
      --border: rgba(55, 53, 47, 0.16);

      --header-background: rgba(55, 53, 47, 0.06);

    }

    html[data-theme="dark"] {
      color-scheme: dark;

      --text: #e9e9e7;
      --sub-text: #9b9a97;
      --border: rgba(255, 255, 255, 0.18);

      --header-background: rgba(255, 255, 255, 0.08);

</head>

<body>
  <main class="page">
    <header class="page-header">
      <div class="title-area">
        <h1 class="page-title">오늘의 급식</h1>
        <div id="dateText" class="date-text">
          급식 정보를 불러오는 중입니다.
        </div>
      </div>

      <button
        id="refreshButton"
        class="refresh-button"
        type="button"
        aria-label="급식 정보 새로고침"
      >
        <span aria-hidden="true">↻</span>
        <span>새로고침</span>
      </button>
    </header>

    <section id="mealGrid" class="meal-grid">
      <article class="meal-card">
        <div class="meal-card-header">조식</div>
        <div id="breakfastCell" class="meal-card-body">
          <span class="empty">불러오는 중</span>
        </div>
      </article>

      <article class="meal-card">
        <div class="meal-card-header">중식</div>
        <div id="lunchCell" class="meal-card-body">
          <span class="empty">불러오는 중</span>
        </div>
      </article>

      <article class="meal-card">
        <div class="meal-card-header">석식</div>
        <div id="dinnerCell" class="meal-card-body">
          <span class="empty">불러오는 중</span>
        </div>
      </article>
    </section>
  </main>

  <script>
    const theme = new URLSearchParams(location.search).get("theme");

    if (theme === "light" || theme === "dark") {
      document.documentElement.dataset.theme = theme;
    }

    const refreshButton = document.getElementById("refreshButton");
    const mealGrid = document.getElementById("mealGrid");

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatMeal(text) {
      if (!text || text === "-") {
        return `<span class="empty">급식 정보 없음</span>`;
      }

      return String(text)
        .split(/<br\s*\/?>/gi)
        .map(item => item.trim())
        .filter(Boolean)
        .map(item => {
          return `<span class="meal-item">${escapeHtml(item)}</span>`;
        })
        .join("");
    }

    function formatDate(dateText) {
      if (!dateText) return "";

      const match = dateText.match(
        /(\d+)년\s*(\d+)월\s*(\d+)일/
      );

      if (!match) return dateText;

      const year = Number(match[1]);
      const month = Number(match[2]);
      const day = Number(match[3]);

      const date = new Date(year, month - 1, day);

      const weekdays = [
        "일요일",
        "월요일",
        "화요일",
        "수요일",
        "목요일",
        "금요일",
        "토요일"
      ];

      return `${year}년 ${month}월 ${day}일 ${weekdays[date.getDay()]}`;
    }

    function showError(message) {
      mealGrid.innerHTML = `
        <div class="status-message error">
          ${escapeHtml(message)}
        </div>
      `;
    }

    async function loadMeal() {
      refreshButton.disabled = true;

      try {
        const response = await fetch("/api/meal", {
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        if (data.error) {
          throw new Error(data.error);
        }

        document.getElementById("breakfastCell").innerHTML =
          formatMeal(data.breakfast);

        document.getElementById("lunchCell").innerHTML =
          formatMeal(data.lunch);

        document.getElementById("dinnerCell").innerHTML =
          formatMeal(data.dinner);

        document.getElementById("dateText").textContent =
          formatDate(data.date);
      } catch (error) {
        console.error("급식 정보 불러오기 실패:", error);
        showError("급식 정보를 불러올 수 없습니다.");
      } finally {
        refreshButton.disabled = false;
      }
    }

    refreshButton.addEventListener("click", loadMeal);

    loadMeal();
  </script>
</body>
</html>
