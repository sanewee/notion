
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Notion Calendar</title>
  <style>
    :root {
      color-scheme: light dark;
      --text: rgba(55, 53, 47, 0.92);
      --muted: rgba(55, 53, 47, 0.56);
      --faint: rgba(55, 53, 47, 0.28);
      --accent-red: #eb5757;
      --accent-blue: #2f80ed;
      --button: rgba(55, 53, 47, 0.08);
      --button-hover: rgba(55, 53, 47, 0.14);
      --today-bg: rgba(237, 210, 128, 0.48);
      --today-text: rgba(55, 53, 47, 0.92);
      --focus: rgba(46, 170, 220, 0.55);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text: rgba(255, 255, 255, 0.86);
        --muted: rgba(255, 255, 255, 0.58);
        --faint: rgba(255, 255, 255, 0.25);
        --accent-red: #ff7369;
        --accent-blue: #6aa7ff;
        --button: rgba(255, 255, 255, 0.10);
        --button-hover: rgba(255, 255, 255, 0.17);
        --today-bg: rgba(246, 202, 92, 0.28);
        --today-text: rgba(255, 255, 255, 0.92);
        --focus: rgba(82, 156, 202, 0.70);
      }
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: transparent;
    }

    body {
      min-width: 224px;
      margin: 0;
      padding: 36px 0 0;
      overflow: hidden;
      background: transparent;
      color: var(--text);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.2;
    }

    .calendar {
      width: 100%;
      background: transparent;
    }

    .toolbar {
      position: relative;
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      grid-template-rows: 26px 30px;
      align-items: center;
      min-height: 56px;
      margin-bottom: 8px;
    }

    .month-nav {
      display: contents;
    }

    .home-slot {
      grid-column: 1;
      grid-row: 1;
      display: grid;
      place-items: center;
    }

    #prevMonth {
      grid-column: 1;
      grid-row: 2;
      justify-self: center;
    }

    #nextMonth {
      grid-column: 7;
      grid-row: 2;
      justify-self: center;
    }

    .month-label {
      grid-column: 2 / 7;
      grid-row: 2;
      justify-self: center;
      width: 136px;
      min-width: 0;
      text-align: center;
      color: var(--text);
      font-size: 18px;
      font-weight: 650;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .home-slot {
      align-items: center;
    }

    button {
      appearance: none;
      display: inline-grid;
      place-items: center;
      height: 26px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      line-height: 1;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    button:hover {
      background: var(--button-hover);
      color: var(--text);
    }

    button:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    .arrow {
      width: 26px;
      padding: 0;
      border-radius: 50%;
      font-size: 18px;
      font-weight: 700;
    }

    .home-button {
      width: 26px;
      padding: 0;
      border-radius: 50%;
      background: var(--button);
      color: var(--muted);
    }

    .home-button svg {
      width: 14px;
      height: 14px;
      stroke-width: 2.1;
    }

    .weekdays,
    .days {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
    }

    .weekdays {
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .weekday,
    .day {
      display: grid;
      place-items: center;
      min-width: 0;
      height: 28px;
      text-align: center;
      letter-spacing: 0;
    }

    .sun {
      color: var(--accent-red);
    }

    .sat {
      color: var(--accent-blue);
    }

    .outside {
      color: var(--faint);
    }

    .day-number {
      display: grid;
      place-items: center;
      width: 26px;
      height: 24px;
      border-radius: 50%;
      font-size: 14px;
      font-weight: 450;
    }

    .today .day-number {
      background: var(--today-bg);
      color: var(--today-text);
      font-weight: 700;
    }

    @media (max-width: 260px) {
      body {
        min-width: 200px;
      }

      .toolbar {
        grid-template-rows: 26px 28px;
        min-height: 54px;
      }

      .month-label {
        width: 120px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="calendar" aria-label="Calendar">
    <div class="toolbar">
      <div class="home-slot">
        <button class="home-button" type="button" id="todayButton" aria-label="Today">
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="m3 11 9-8 9 8"></path>
            <path d="M5 10v10h14V10"></path>
            <path d="M10 20v-6h4v6"></path>
          </svg>
        </button>
      </div>
      <div class="month-nav">
        <button class="arrow" type="button" id="prevMonth" aria-label="Previous month">&lsaquo;</button>
        <div class="month-label" id="monthLabel" aria-live="polite"></div>
        <button class="arrow" type="button" id="nextMonth" aria-label="Next month">&rsaquo;</button>
      </div>
    </div>
    <section class="weekdays" aria-hidden="true">
      <div class="weekday sun">S</div>
      <div class="weekday">M</div>
      <div class="weekday">T</div>
      <div class="weekday">W</div>
      <div class="weekday">T</div>
      <div class="weekday">F</div>
      <div class="weekday sat">S</div>
    </section>
    <section class="days" id="days" aria-label="Days"></section>
  </main>

  <script>
    const monthLabel = document.getElementById("monthLabel");
    const days = document.getElementById("days");
    const prevMonth = document.getElementById("prevMonth");
    const nextMonth = document.getElementById("nextMonth");
    const todayButton = document.getElementById("todayButton");

    const monthNames = [
      "January", "February", "March", "April", "May", "June",
      "July", "August", "September", "October", "November", "December"
    ];

    const realToday = new Date();
    realToday.setHours(0, 0, 0, 0);

    let viewYear = realToday.getFullYear();
    let viewMonth = realToday.getMonth();

    function sameDate(a, b) {
      return a.getFullYear() === b.getFullYear()
        && a.getMonth() === b.getMonth()
        && a.getDate() === b.getDate();
    }

    function renderCalendar() {
      monthLabel.textContent = `${monthNames[viewMonth]} ${viewYear}`;
      days.replaceChildren();

      const firstOfMonth = new Date(viewYear, viewMonth, 1);
      const start = new Date(viewYear, viewMonth, 1 - firstOfMonth.getDay());

      for (let index = 0; index < 42; index += 1) {
        const date = new Date(start);
        date.setDate(start.getDate() + index);

        const cell = document.createElement("div");
        const number = document.createElement("span");
        const weekday = index % 7;

        cell.className = "day";
        number.className = "day-number";
        number.textContent = date.getDate();
        cell.setAttribute("aria-label", `${monthNames[date.getMonth()]} ${date.getDate()} ${date.getFullYear()}`);

        if (date.getMonth() !== viewMonth) {
          cell.classList.add("outside");
        }

        if (weekday === 0) {
          cell.classList.add("sun");
        } else if (weekday === 6) {
          cell.classList.add("sat");
        }

        if (sameDate(date, realToday)) {
          cell.classList.add("today");
        }

        cell.append(number);
        days.append(cell);
      }
    }

    prevMonth.addEventListener("click", () => {
      viewMonth -= 1;
      if (viewMonth < 0) {
        viewMonth = 11;
        viewYear -= 1;
      }
      renderCalendar();
    });

    nextMonth.addEventListener("click", () => {
      viewMonth += 1;
      if (viewMonth > 11) {
        viewMonth = 0;
        viewYear += 1;
      }
      renderCalendar();
    });

    todayButton.addEventListener("click", () => {
      viewYear = realToday.getFullYear();
      viewMonth = realToday.getMonth();
      renderCalendar();
    });

    renderCalendar();
  </script>
</body>
</html>
